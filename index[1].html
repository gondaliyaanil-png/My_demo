<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>-page</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔥 PASTE YOUR FIREBASE CONFIG BELOW
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE",
  messagingSenderId: "PASTE_HERE",
  appId: "PASTE_HERE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const PASSWORD = "@s14";
const AUTO_DELETE_DAYS = 7;

window.login = function(){
  if(document.getElementById("pass").value === PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";
  } else alert("Wrong Password");
}

window.send = async function(){
  let text = document.getElementById("msg").value;
  let file = document.getElementById("img").files[0];
  let imageUrl = "";

  if(file){
    const storageRef = ref(storage, 'images/' + Date.now());
    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db,"messages"),{
    text:text,
    image:imageUrl,
    time:Date.now()
  });

  document.getElementById("msg").value="";
  document.getElementById("img").value="";
}

const q = query(collection(db,"messages"), orderBy("time"));
onSnapshot(q,(snapshot)=>{
  let box = document.getElementById("box");
  box.innerHTML="";
  snapshot.forEach((docu)=>{
    let d = docu.data();
    if(Date.now() - d.time > AUTO_DELETE_DAYS*24*60*60*1000){
      deleteDoc(doc(db,"messages",docu.id));
    } else {
      box.innerHTML += `<div style="border:1px solid #ccc;padding:8px;margin:5px;">
      ${d.text || ""}<br>
      ${d.image?`<img src="${d.image}" width="120">`:""}
      <button onclick="deleteMsg('${docu.id}')">❌ Delete</button>
      </div>`;
    }
  });
});

window.deleteMsg = async function(id){
  await deleteDoc(doc(db,"messages",id));
}
</script>

</head>

<body>

<div id="login">
<h3>-page Login</h3>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Enter</button>
</div>

<div id="chat" style="display:none;">
<div id="box"></div>
<input id="msg" placeholder="Message">
<input type="file" id="img">
<button onclick="send()">Send</button>
</div>

</body>
</html>
